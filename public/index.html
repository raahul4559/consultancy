<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>EduVista Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <!-- ========== Login ========== -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <div class="login-logo"><span class="logo-icon">E</span> EduVista</div>
      <p class="login-subtitle">Admin Dashboard &mdash; sign in to continue</p>
      <div id="login-error" class="login-error" style="display:none;"></div>
      <form id="login-form" class="form" onsubmit="return false;">
        <div class="field">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" required autocomplete="username" placeholder="admin">
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-block">Sign In</button>
      </form>
    </div>
  </div>

  <!-- ========== App Shell ========== -->
  <div id="app" class="layout" style="display:none;">

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="brand"><span class="logo-icon">E</span> <span class="brand-text">EduVista</span></div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-label">Main</div>
          <a href="#/dashboard" class="nav-link" data-route="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Dashboard</span>
          </a>
          <a href="#/leads" class="nav-link" data-route="leads">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Leads</span>
            <span class="nav-badge" id="badge-leads"></span>
          </a>
          <a href="#/pipeline" class="nav-link" data-route="pipeline">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="6" height="18" rx="1"/><rect x="9" y="6" width="6" height="15" rx="1"/><rect x="17" y="9" width="6" height="12" rx="1"/></svg>
            <span>Pipeline</span>
          </a>
          <a href="#/reminders" class="nav-link" data-route="reminders">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span>Reminders</span>
            <span class="nav-badge" id="badge-reminders"></span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-row">
          <div class="avatar" id="sidebar-avatar">A</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-username">admin</div>
            <div class="user-role">EduVista Admin</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn mobile-only" id="mobile-menu-btn" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="page-title" id="page-title">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <div class="topbar-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="global-search" placeholder="Search by name, phone, email…">
          </div>
          <button class="icon-btn" id="logout-btn" title="Sign out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <div id="content" class="content"></div>
    </main>
  </div>

  <!-- ========== Lead Detail Modal ========== -->
  <div id="lead-modal" class="modal-overlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div>
          <h2 id="modal-lead-name">Lead</h2>
          <div class="modal-sub" id="modal-lead-sub"></div>
        </div>
        <button class="icon-btn modal-close" id="modal-close-btn" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="info">Info</button>
        <button class="modal-tab" data-tab="notes">Notes</button>
        <button class="modal-tab" data-tab="reminders">Reminders</button>
        <button class="modal-tab" data-tab="activity">Activity</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="modal-delete-btn">Delete lead</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/js/admin/api.js"></script>
  <script src="/js/admin/auth.js"></script>
  <script src="/js/admin/leads.js"></script>
  <script src="/js/admin/pipeline.js"></script>
  <script src="/js/admin/reminders.js"></script>
  <script src="/js/admin/analytics.js"></script>
  <script src="/js/admin/detail.js"></script>
  <script src="/js/admin/app.js"></script>
</body>
</html>
